- match: "(.*)URN:URN:\\s*(\\S+)(.*)"
  replace: "$(1)URN:$(2)$(3)"
- match: "(.*)DOI:\\s*(10[.]\\d{4,9}/\\S+)(.*)"
  replace: "$(1)doi:$(2)$(3)"
- match: "(.*)(?:https?://)\\s*(?:doi[.]org/)\\s*(10[.]\\d{4,9}/\\S+)(.*)"
  replace: "$(1)https://doi.org/$(2)$(3)"
- match: "^(10\\.\\d{4,9}/\\S+)\\s*$"
  replace: "doi:$(1)"
- match: "(.*)doi:(10[.]\\d{4,9})/(\\S+)–(\\S+)(.*)"
  replace: "$(1)doi:$(2)/$(3)-$(4)$(5)"
- match: "(.*)https?://hdl[.]handle[.]net/10622/([A-Z0-9]+)\\s*-\\s*(\\d+)$"
  replace: "$(1)https://hdl.handle.net/10622/$(2).$(3)"
